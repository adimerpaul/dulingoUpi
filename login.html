<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumo — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" width="60" height="60">
        <rect x="2" y="2" width="36" height="36" rx="11" fill="#ff9a3d"/>
        <circle cx="14" cy="17" r="6.5" fill="#fff"/><circle cx="26" cy="17" r="6.5" fill="#fff"/>
        <circle cx="15" cy="18" r="3" fill="#33271a"/><circle cx="25" cy="18" r="3" fill="#33271a"/>
        <path d="M16 25 L24 25 L20 31 Z" fill="#ffb838"/>
      </svg>
    </div>

    <h1 class="fred">Bienvenido a Lumo</h1>
    <p class="auth-sub">Inicia sesión para continuar aprendiendo inglés</p>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button type="submit" class="btn btn-primary w-full" style="margin-top:8px">
        Iniciar sesión
      </button>
    </form>

    <p class="auth-link">
      ¿No tienes cuenta? <a href="./register.html">Regístrate gratis</a>
    </p>
  </div>
</div>

<script src="./js/api.js"></script>
<script src="./js/auth.js"></script>
</body>
</html>
